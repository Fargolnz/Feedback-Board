<!DOCTYPE html>
<html lang="fa" dir="rtl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ثبت فیدبک | Feedback Board</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="/static/css/style.css" />
    </head>

    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
            <div class="container">
            <span class="navbar-brand">Feedback Board</span>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="/dashboard">داشبورد مدیریت</a>
            </div>
            </div>
        </nav>

        <main class="container">
            <div class="row justify-content-center">
                <div class="col-lg-7">
                    <div class="card p-4">
                    <h1 class="h4 mb-3">ثبت فیدبک</h1>
                    <p class="text-muted mb-4">نظرات و پیشنهادات خود را با ما به اشتراک بگذارید.</p>

                    <div id="alert-box" class="alert d-none" role="alert"></div>

                    <form id="feedback-form">
                        <div class="mb-3">
                        <label for="title" class="form-label">عنوان</label>
                        <input type="text" class="form-control" id="title" maxlength="200" required />
                        </div>
                        <div class="mb-3">
                        <label for="message" class="form-label">متن پیام</label>
                        <textarea class="form-control" id="message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">ارسال فیدبک</button>
                    </form>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
