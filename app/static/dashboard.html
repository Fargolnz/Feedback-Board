<!DOCTYPE html>
<html lang="fa" dir="rtl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>داشبورد مدیریت | Feedback Board</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="/static/css/style.css" />
    </head>

    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
            <div class="container">
                <span class="navbar-brand">داشبورد مدیریت فیدبک</span>
                <div class="navbar-nav ms-auto">
                    <a class="btn btn-light" href="/">ثبت فیدبک</a>
                </div>
            </div>
        </nav>

        <main class="container">
            <div class="card p-4">
                <h1 class="h4 mb-3">لیست فیدبک‌ها</h1>
                <p class="text-muted mb-4">وضعیت هر فیدبک را از اینجا تغییر دهید.</p>
                <div id="alert-box" class="alert d-none" role="alert"></div>
                <div id="empty-state" class="alert alert-info d-none">هنوز فیدبکی ثبت نشده است.</div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                        <th>#</th>
                        <th>عنوان</th>
                        <th>پیام</th>
                        <th>تاریخ</th>
                        <th>وضعیت</th>
                        <th>تغییر وضعیت</th>
                        </tr>
                    </thead>
                    <tbody id="feedback-table-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </body>
</html>
